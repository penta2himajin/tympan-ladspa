name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `stable` exercises the latest toolchain; the pinned version
        # matches Cargo.toml's `rust-version` and guards the declared
        # MSRV from accidental regressions.
        rust: [stable, "1.75"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  example:
    name: examples (LADSPA SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install ladspa-sdk and sox
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ladspa-sdk sox
      - name: Build example cdylibs
        run: cargo build --release -p tympan-gain -p tympan-noise-gate -p tympan-delay
      - name: ladspa_descriptor symbol exported by every example
        run: |
          set -euo pipefail
          for so in target/release/libtympan_gain.so \
                    target/release/libtympan_noise_gate.so \
                    target/release/libtympan_delay.so; do
            echo "checking $so"
            nm -D --defined-only "$so" | grep -E ' T ladspa_descriptor$'
          done
      - name: analyseplugin reads gain descriptor
        env:
          LADSPA_PATH: ${{ github.workspace }}/target/release
        run: |
          set -euo pipefail
          analyseplugin libtympan_gain.so | tee analyse_gain.txt
          grep -q 'Plugin Name: "Tympan Linear Gain"' analyse_gain.txt
          grep -q 'Plugin Label: "tympan_gain"' analyse_gain.txt
          grep -q 'Plugin Unique ID: 12345' analyse_gain.txt
          # ADR 0001 — framework intentionally leaves run_adding unset.
          grep -q 'Has run_adding() Function: No' analyse_gain.txt
          # ADR 0002 — control port bounds and default round-trip.
          grep -qE '"Gain" input, control, 0 to 4, default 1' analyse_gain.txt
      - name: analyseplugin reads noise-gate descriptor
        env:
          LADSPA_PATH: ${{ github.workspace }}/target/release
        run: |
          set -euo pipefail
          analyseplugin libtympan_noise_gate.so | tee analyse_gate.txt
          grep -q 'Plugin Name: "Tympan Hysteresis Noise Gate"' analyse_gate.txt
          grep -q 'Plugin Label: "tympan_noise_gate"' analyse_gate.txt
          grep -q 'Plugin Unique ID: 23456' analyse_gate.txt
          grep -q 'Has run_adding() Function: No' analyse_gate.txt
          # The two threshold controls round-trip with their bounds and
          # symbolic defaults intact.
          grep -qE '"Open Threshold" input, control, 0 to 1' analyse_gate.txt
          grep -qE '"Close Threshold" input, control, 0 to 1' analyse_gate.txt
      - name: applyplugin drives the gain lifecycle on a WAV
        env:
          LADSPA_PATH: ${{ github.workspace }}/target/release
        run: |
          set -euo pipefail
          sox -n -r 48000 -c 1 -b 16 input.wav synth 0.1 sine 440 vol 0.3
          applyplugin input.wav output.wav libtympan_gain.so tympan_gain 2.0 \
            | tee apply.log
          # The framework's FFI shim drove instantiate → connect_port (×3)
          # → activate → run → deactivate → cleanup. Numerical check
          # below confirms the run callback received the right buffers.
          PEAK=$(grep -oE 'Peak output: [0-9.]+' apply.log | awk '{print $NF}')
          python3 - <<PY
          peak = float("$PEAK")
          assert 0.59 <= peak <= 0.61, f"expected ~0.6 (gain=2.0 * input peak 0.3), got {peak}"
          PY
          # Length and encoding preserved.
          test "$(soxi -s input.wav)" = "$(soxi -s output.wav)"
      - name: applyplugin drives the noise-gate lifecycle on a WAV
        env:
          LADSPA_PATH: ${{ github.workspace }}/target/release
        run: |
          set -euo pipefail
          # Loud sine well above both thresholds. The gate latches
          # open on the first sample over open_threshold and stays
          # open for the rest of the buffer, so output == input.
          sox -n -r 48000 -c 1 -b 16 loud.wav synth 0.1 sine 440 vol 0.6
          applyplugin loud.wav out_loud.wav libtympan_noise_gate.so \
            tympan_noise_gate 0.4 0.1 | tee apply_loud.log
          PEAK_IN=$(soxi loud.wav    | grep -oE '\-?[0-9.]+' | head -1 || true)
          PEAK_OUT=$(grep -oE 'Peak output: [0-9.]+' apply_loud.log | awk '{print $NF}')
          python3 - <<PY
          peak_out = float("$PEAK_OUT")
          assert 0.55 <= peak_out <= 0.65, f"expected loud signal to pass through (~0.6), got {peak_out}"
          PY
          # Quiet sine well below close_threshold. Gate never opens →
          # output is silence.
          sox -n -r 48000 -c 1 -b 16 quiet.wav synth 0.1 sine 440 vol 0.05
          applyplugin quiet.wav out_quiet.wav libtympan_noise_gate.so \
            tympan_noise_gate 0.4 0.1 | tee apply_quiet.log
          PEAK_QUIET=$(grep -oE 'Peak output: [0-9.]+' apply_quiet.log | awk '{print $NF}')
          python3 - <<PY
          peak = float("$PEAK_QUIET")
          assert peak == 0.0, f"expected silence (gate closed throughout), got {peak}"
          PY
      - name: analyseplugin reads delay descriptor
        env:
          LADSPA_PATH: ${{ github.workspace }}/target/release
        run: |
          set -euo pipefail
          analyseplugin libtympan_delay.so | tee analyse_delay.txt
          grep -q 'Plugin Name: "Tympan Feedback Delay"' analyse_delay.txt
          grep -q 'Plugin Label: "tympan_delay"' analyse_delay.txt
          grep -q 'Plugin Unique ID: 34567' analyse_delay.txt
          grep -q 'Has run_adding() Function: No' analyse_delay.txt
          # All three control ports — bounds and defaults round-trip.
          grep -qE '"Delay \(ms\)" input, control, 0 to 2000, default 100' analyse_delay.txt
          grep -qE '"Feedback" input, control, 0 to 0.95' analyse_delay.txt
          grep -qE '"Mix" input, control, 0 to 1' analyse_delay.txt
      - name: applyplugin drives the delay lifecycle on a WAV
        env:
          LADSPA_PATH: ${{ github.workspace }}/target/release
        run: |
          set -euo pipefail
          # 10 ms click then 200 ms silence, mono 48 kHz.
          sox -n -r 48000 -c 1 -b 16 click.wav synth 0.01 sine 1000 vol 0.5 pad 0 0.2
          # delay=50 ms, feedback=0, mix=1 (pure delayed signal).
          applyplugin click.wav out_delay.wav libtympan_delay.so \
            tympan_delay 50.0 0.0 1.0 | tee apply_delay.log
          # Output should preserve the input peak (mix=1, feedback=0
          # is a passthrough delay). Length and encoding preserved.
          PEAK=$(grep -oE 'Peak output: [0-9.]+' apply_delay.log | awk '{print $NF}')
          python3 - <<PY
          peak = float("$PEAK")
          assert 0.45 <= peak <= 0.55, f"expected ~0.5 (input peak, delayed but not attenuated), got {peak}"
          PY
          test "$(soxi -s click.wav)" = "$(soxi -s out_delay.wav)"
          # And confirm silence-in, silence-out for a fully-silent
          # buffer — exercises the buffer-overflow path of apply_delay.
          sox -n -r 48000 -c 1 -b 16 silent.wav synth 0.05 sine 440 vol 0.0
          applyplugin silent.wav out_silent.wav libtympan_delay.so \
            tympan_delay 50.0 0.5 0.5 | tee apply_silent.log
          PEAK_SILENT=$(grep -oE 'Peak output: [-0-9.e]+' apply_silent.log | awk '{print $NF}')
          python3 - <<PY
          peak = float("$PEAK_SILENT")
          # 16-bit PCM has a 1-LSB quantisation floor at ~1.53e-5
          # (= 2^-16); a "silent" output round-tripped through
          # libsndfile lands at or just above that. We assert the
          # output is below -60 dBFS, two orders of magnitude under
          # any meaningful signal.
          assert peak < 1e-3, f"expected ≈ silence through the delay, got {peak}"
          PY
